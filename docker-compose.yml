version: "3.9"

services:

  # ── База данных ──────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     taipan_user
      POSTGRES_PASSWORD: taipan_pass
      POSTGRES_DB:       taipan_db
      - ANTHROPIC_API_KEY=${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}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # ── Redis (брокер для Celery) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always

  # ── Backend FastAPI ──────────────────────────────────────────────
  backend:
    build: ./backend
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL:        postgresql://taipan_user:taipan_pass@db:5432/taipan_db
      SECRET_KEY:          taipan_super_secret_key_2026
      REDIS_URL:           redis://redis:6379/0
      TELEGRAM_BOT_TOKEN:  ${TELEGRAM_BOT_TOKEN}
      SITE_URL:            ${SITE_URL:-http://185.152.92.101}
    ports:
      - "8000:8000"
    restart: always

  # ── Celery воркер (отправка напоминаний) ─────────────────────────
  celery_worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL:       postgresql://taipan_user:taipan_pass@db:5432/taipan_db
      REDIS_URL:          redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    restart: always

  # ── Celery Beat (планировщик — каждые 10 минут проверяет) ────────
  celery_beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
    restart: always

  # ── Frontend React ───────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    restart: always

volumes:
  postgres_data: