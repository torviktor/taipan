services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      YANDEX_API_KEY:    ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID:  ${YANDEX_FOLDER_ID}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: ./backend
    depends_on:
      - db
      - redis
    volumes:
      - competition_files:/app/static/competition-files
      - analytics_files:/app/static/analytics
      - hof_files:/app/static/hall-of-fame
    environment:
      DATABASE_URL:        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY:          ${SECRET_KEY}
      REDIS_URL:           redis://redis:6379/0
      TELEGRAM_BOT_TOKEN:  ${TELEGRAM_BOT_TOKEN}
      SITE_URL:            ${SITE_URL:-http://185.152.92.101}
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY}
      YANDEX_API_KEY:    ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID:  ${YANDEX_FOLDER_ID}
    ports:
      - "8000:8000"
    restart: always

  celery_worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL:          redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    restart: always

  celery_beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    restart: always

volumes:
  postgres_data:
  competition_files:
  analytics_files:
  hof_files:
