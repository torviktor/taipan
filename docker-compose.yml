services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      YANDEX_API_KEY:    ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID:  ${YANDEX_FOLDER_ID}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: ./backend
    depends_on:
      - db
      - redis
    volumes:
      - competition_files:/app/static/competition-files
      - analytics_files:/app/static/analytics
      - hof_files:/app/static/hall-of-fame
      - static_files:/app/static
    environment:
      DATABASE_URL:        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY:          ${SECRET_KEY}
      REDIS_URL:           redis://redis:6379/0
      TELEGRAM_BOT_TOKEN:  ${TELEGRAM_BOT_TOKEN}
      SITE_URL:            ${SITE_URL:-http://185.152.92.101}
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY}
      YANDEX_API_KEY:      ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID:    ${YANDEX_FOLDER_ID}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  celery_worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL:          redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  celery_beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
    deploy:
      resources:
        limits:
          memory: 128M
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    restart: always

  db-backup:
    image: postgres:15-alpine
    depends_on:
      - db
    volumes:
      - db_backups:/backups
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    command: sh -c "while true; do pg_dump $$DATABASE_URL > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql; sleep 86400; done"
    restart: always

volumes:
  postgres_data:
  competition_files:
  analytics_files:
  hof_files:
  static_files:
  db_backups: