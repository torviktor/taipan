name: Deploy Тайпан

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Проверка сборки фронтенда
        run: cd frontend && npm install && npm run build

      - name: Проверка синтаксиса бэкенда
        run: |
          cd backend
          python3 -m py_compile app/main.py
          find app/ -name "*.py" -exec python3 -m py_compile {} +

  deploy:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Deploy на сервер
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/taipan

            # ── 1. Удалить старый скрипт если есть
            rm -f /opt/taipan/deploy-club-info.sh

            # ── 2. Получить свежий код (сбросить локальные изменения)
            sudo git fetch origin main
            sudo git reset --hard origin/main

            # ── 3. Пересборка и запуск
            sudo docker compose build
            sudo docker compose up -d --remove-orphans --force-recreate
            sudo docker image prune -f

            echo "Деплой завершён"
