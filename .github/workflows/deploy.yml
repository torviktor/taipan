name: Deploy Тайпан

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy на сервер
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/taipan

            # ── 1. Удалить старый скрипт если есть
            rm -f /opt/taipan/deploy-club-info.sh

            # ── 2. Получить свежий код (сбросить локальные изменения)
            sudo git fetch origin main
            sudo git reset --hard origin/main

            # ── 3. Миграция БД
            sleep 3
            sudo docker compose exec -T backend python /app/migrations/add_insurance_strategy_fields.py

            # ── 4. Пересборка и запуск
            sudo docker compose build --no-cache backend frontend
            sudo docker compose up -d
            sudo docker image prune -f

            echo "Деплой завершён"
