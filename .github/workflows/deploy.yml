name: Deploy Тайпан

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy на сервер
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/taipan

            # ── 1. Удалить старый скрипт если есть
            rm -f /opt/taipan/deploy-club-info.sh

            # ── 2. Получить свежий код
            sudo git pull origin main

            # ── 3. Патч user.py
            sudo docker compose run --rm --no-deps backend python3 /app/migrations/patch_models.py

            # ── 4. Патч main.py
            sudo docker compose run --rm --no-deps backend python3 /app/migrations/patch_main.py

            # ── 5. Патч Cabinet.jsx напрямую (python3 на хосте)
            sudo python3 /opt/taipan/frontend/src/pages/_patch_cabinet.py

            # ── 6. Патч App.jsx напрямую
            sudo python3 /opt/taipan/frontend/src/pages/_patch_app.py

            # ── 7. Удалить патч-скрипты
            rm -f /opt/taipan/frontend/src/pages/_patch_cabinet.py
            rm -f /opt/taipan/frontend/src/pages/_patch_app.py

            # ── 8. Пересборка и запуск
            sudo docker compose build --no-cache backend frontend
            sudo docker compose up -d
            sudo docker image prune -f

            # ── 9. Миграция БД
            sleep 8
            sudo docker compose exec -T backend python /app/migrations/add_insurance_strategy_fields.py

            echo "Деплой завершён"
