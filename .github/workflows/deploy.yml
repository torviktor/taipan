name: Deploy Тайпан

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Проверка сборки фронтенда
        run: cd frontend && npm install && npm run build

      - name: Проверка синтаксиса бэкенда
        run: |
          cd backend
          python3 -m py_compile app/main.py
          find app/ -name "*.py" -exec python3 -m py_compile {} +

  deploy:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Deploy на сервер
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/taipan

            # 1. Получить свежий код
            git fetch origin main
            git reset --hard origin/main

            # 2. Пересборка БЕЗ кэша (иначе старый код попадёт в новый образ)
            docker compose build --no-cache

            # 3. Корректное пересоздание: down + up
            #    Это устраняет race condition с conflict имён контейнеров
            #    при параллельном --force-recreate. Простой ~10-15 сек.
            docker compose down
            docker compose up -d --remove-orphans

            # 4. Чистка dangling-образов
            docker image prune -f

            echo "Деплой завершён"
